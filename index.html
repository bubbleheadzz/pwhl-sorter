<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <meta http-equiv="Content-Script-Type" content="text/javascript">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pick which team you prefer in each matchup to get an accurate list of your favourite teams in the PWHL.">
  <title>PWHL Sorter</title>
  <link href="https://fonts.googleapis.com/css?family=Josefin+Slab:600" rel="stylesheet" type="text/css">
  <link href="styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <header>
    <br /><br />
    <b><h1>PWHL TEAM SORTER</h1></b>
    <div id="instructions">
      Pick which team you prefer in each matchup to get an accurate list of your favourite teams in the PWHL.
      <p><u>Note: The more often you hit 'It's a tie', the less accurate your result will be.</u></p>
    </div>
  </header>

  <table id="mainTable" align="center">
    <tbody>
      <tr>
        <td id="battleNumber" colspan="3" style="padding-top: 15px; padding-bottom: 15px;" style="text-align:center;">
          <b><br />Battle #1<br>0% sorted.</b>
        </td>
      </tr>
      <tr>
        <td id="leftField" rowspan="3" style="text-align:center;" onclick="if(sorterApp && !sorterApp.state.finishFlag) sorterApp.handleChoice(-1);"></td>
        <td class="middleField" onclick="if(sorterApp && !sorterApp.state.finishFlag) sorterApp.handleChoice(0);" style="text-align:center;">
          <div id="tie">
            <br />
            It's a tie
            <br />
          </div>
        </td>
        <td id="rightField" rowspan="3" style="text-align:center;" onclick="if(sorterApp && !sorterApp.state.finishFlag) sorterApp.handleChoice(1);"></td>
      </tr>
      <tr>
        <td class="middleField" onclick="if(sorterApp) sorterApp.handleUndo();" style="text-align:center;">
          <div id="back">
            <br />
            Back
            <br />
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <br><br>

  <div id="resultField" style="text-align: center; border: 1px solid #330000;">
  </div>

  <p class="other">
    <center>
      <small><br /><a href="http://edthekraken.carrd.co/">built by edthekraken</a></small>
    </center>
  </p>

  <!-- Scripts -->
  <script src="teams.js"></script>
  <script src="sorter.js"></script>
  <script>
    // Application controller
    class SorterApp {
      constructor(teamsData) {
        this.state = null;
        this.init(teamsData);
      }

      init(teamsData) {
        const namMember = initializeTeams(teamsData);
        this.state = new SorterState(namMember);
        this.render();
      }

      render() {
        if (this.state.isComplete()) {
          this.renderResults();
        } else {
          this.renderBattle();
        }
      }

      renderBattle() {
        const battleNum = this.state.numQuestion;
        const progress = this.state.getProgress();
        const left = this.state.namMember[this.state.lstMember[this.state.cmp1][this.state.head1]];
        const right = this.state.namMember[this.state.lstMember[this.state.cmp2][this.state.head2]];

        document.getElementById('battleNumber').innerHTML = `Battle #${battleNum}<br>${progress}% sorted.`;
        document.getElementById('leftField').innerHTML = left;
        document.getElementById('rightField').innerHTML = right;
      }

      renderResults() {
        const results = this.state.getResults();
        let html = '<table id="results"><tr>';
        html += '<td class="rank-header">rank</td>';
        html += '<td class="rank-header">team</td>';
        html += '</tr>';

        results.forEach(result => {
          html += `<tr><td>${result.rank}</td><td>${result.teamName}</td></tr>`;
        });

        html += '</table>';

        const battleNum = this.state.numQuestion - 1;
        const progress = this.state.getProgress();
        document.getElementById('battleNumber').innerHTML = `Battle #${battleNum}<br>${progress}% sorted.`;
        document.getElementById('resultField').innerHTML = html;
      }

      handleChoice(flag) {
        const isComplete = this.state.sortList(flag);
        this.state.numQuestion++;
        this.render();
      }

      handleUndo() {
        if (this.state.undoLastChoice()) {
          this.render();
        } else {
          alert("No moves to undo!");
        }
      }
    }

    // Initialize app when page loads
    const sorterApp = new SorterApp(teams);
  </script>
</body>
</html>
